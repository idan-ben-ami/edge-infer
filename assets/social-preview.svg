<?xml version="1.0" encoding="UTF-8"?>
<!--
  V8: V2 palette (navy + hot orange) + aurora + Catppuccin-style code panel.
    Surround:
      navy        #0B1220   base
      orange      #FF6B1A   chevron, arrow, bullets
      white       #FFFFFF   headline
      gray        #94A3B8   subhead, secondary text
    Code panel (Catppuccin Mocha applied to V2 navy bg):
      mauve       #CBA6F7   keywords (pub fn, let mut, mut, attributes)
      blue        #89B4FA   function names
      peach       #FAB387   types / module names (f32, ops)
      pink        #F38BA8   numbers, UPPER_CONSTANTS
      cream       #CDD6F4   identifiers
      overlay     #7F849C   comments
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Aurora blobs in V2-aligned palette: cobalt blues + warm orange echo -->
    <radialGradient id="b1" cx="20%" cy="18%" r="62%">
      <stop offset="0%" stop-color="#5A6FE8" stop-opacity="0.50"/>
      <stop offset="40%" stop-color="#3D4FCC" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3D4FCC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="68%" cy="82%" r="55%">
      <stop offset="0%" stop-color="#1F2D6A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1F2D6A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="86%" cy="20%" r="42%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b4" cx="35%" cy="62%" r="38%">
      <stop offset="0%" stop-color="#0F1A3D" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F1A3D" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid8" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7C8DDB" stroke-width="0.5" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Aurora background (V2 navy base) -->
  <rect width="1280" height="640" fill="#0B1220"/>
  <rect width="1280" height="640" fill="url(#b1)"/>
  <rect width="1280" height="640" fill="url(#b2)"/>
  <rect width="1280" height="640" fill="url(#b3)"/>
  <rect width="1280" height="640" fill="url(#b4)"/>
  <rect width="1280" height="640" fill="url(#grid8)" opacity="0.85"/>

  <!-- Brand chevron (V2 hot orange) + EDGE-INFER label -->
  <g transform="translate(72,72)" fill="none" stroke="#FF6B1A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 0 L 18 18 L 0 36"/>
    <path d="M 24 0 L 42 18 L 24 36"/>
  </g>
  <text x="132" y="103" font-family="ui-sans-serif, -apple-system, 'Inter', 'SF Pro Text', sans-serif"
        font-size="22" font-weight="600" fill="#94A3B8" letter-spacing="2">EDGE-INFER</text>

  <!-- Headline -->
  <text x="72" y="240"
        font-family="ui-sans-serif, -apple-system, 'Inter', 'SF Pro Display', sans-serif"
        font-size="74" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">ONNX</tspan>
    <tspan fill="#FF6B1A"> → </tspan>
    <tspan fill="#FFFFFF">Rust</tspan>
  </text>
  <text x="72" y="304"
        font-family="ui-sans-serif, -apple-system, 'Inter', 'SF Pro Display', sans-serif"
        font-size="40" font-weight="700" fill="#94A3B8" letter-spacing="-1">
    compiled to bare metal
  </text>

  <!-- Three proof bullets -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace"
     font-size="20" font-weight="500">
    <text x="72" y="430">
      <tspan fill="#FF6B1A">●</tspan>
      <tspan fill="#FFFFFF" font-weight="700">  54 KB</tspan>
      <tspan fill="#94A3B8"> on Cortex-M4</tspan>
    </text>
    <text x="72" y="470">
      <tspan fill="#FF6B1A">●</tspan>
      <tspan fill="#FFFFFF" font-weight="700">  0-byte heap,</tspan>
      <tspan fill="#94A3B8"> no allocator</tspan>
    </text>
    <text x="72" y="510">
      <tspan fill="#FF6B1A">●</tspan>
      <tspan fill="#FFFFFF" font-weight="700">  98.88%</tspan>
      <tspan fill="#94A3B8"> on MNIST (INT8)</tspan>
    </text>
  </g>

  <!-- Code panel: V2 navy bg matching canvas (carved-in feel) -->
  <g transform="translate(596,84)">
    <rect x="4" y="10" width="612" height="472" rx="14" fill="#000000" opacity="0.40"/>
    <rect x="0" y="0" width="612" height="472" rx="14" fill="#0B1220"
          stroke="#3F4B95" stroke-width="1" stroke-opacity="0.50"/>

    <!-- Title bar w/ Mac-style traffic lights using Catppuccin red/peach/green -->
    <line x1="0" y1="40" x2="612" y2="40" stroke="#3F4B95" stroke-opacity="0.40"/>
    <circle cx="22" cy="20" r="5" fill="#F38BA8"/>
    <circle cx="42" cy="20" r="5" fill="#FAB387"/>
    <circle cx="62" cy="20" r="5" fill="#A6E3A1"/>
    <text x="612" y="25" text-anchor="end" dx="-20"
          font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace"
          font-size="13" fill="#94A3B8">mnist_model/src/lib.rs</text>

    <!-- Code body, Catppuccin Mocha syntax -->
    <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace"
       font-size="17">
      <text x="24" y="76" fill="#7F849C" font-style="italic">// Generated by edge-infer — no edits, no runtime.</text>
      <text x="24" y="106" fill="#FAB387" font-weight="600">#![no_std]</text>

      <text x="24" y="156">
        <tspan fill="#CBA6F7" font-weight="600">pub fn </tspan><tspan fill="#89B4FA" font-weight="700">predict</tspan><tspan fill="#CDD6F4">(input: &amp;[[[</tspan><tspan fill="#FAB387">f32</tspan><tspan fill="#CDD6F4">; </tspan><tspan fill="#F38BA8">28</tspan><tspan fill="#CDD6F4">]; </tspan><tspan fill="#F38BA8">28</tspan><tspan fill="#CDD6F4">]; </tspan><tspan fill="#F38BA8">1</tspan><tspan fill="#CDD6F4">])</tspan>
      </text>
      <text x="24" y="180">
        <tspan fill="#CDD6F4">    -&gt; [</tspan><tspan fill="#FAB387">f32</tspan><tspan fill="#CDD6F4">; </tspan><tspan fill="#F38BA8">10</tspan><tspan fill="#CDD6F4">]</tspan>
      </text>
      <text x="24" y="204">
        <tspan fill="#CDD6F4">{</tspan>
      </text>
      <text x="24" y="232">
        <tspan fill="#CDD6F4">    </tspan><tspan fill="#CBA6F7" font-weight="600">let mut</tspan><tspan fill="#CDD6F4"> conv1 = [[[</tspan><tspan fill="#F38BA8">0.0f32</tspan><tspan fill="#CDD6F4">; </tspan><tspan fill="#F38BA8">28</tspan><tspan fill="#CDD6F4">]; </tspan><tspan fill="#F38BA8">28</tspan><tspan fill="#CDD6F4">]; </tspan><tspan fill="#F38BA8">8</tspan><tspan fill="#CDD6F4">];</tspan>
      </text>
      <text x="24" y="256">
        <tspan fill="#FAB387">    ops</tspan><tspan fill="#CDD6F4">::</tspan><tspan fill="#89B4FA" font-weight="700">conv2d</tspan><tspan fill="#CDD6F4">::&lt;</tspan><tspan fill="#F38BA8">1, 8, 3, 28, 28, 28, 28, 1</tspan><tspan fill="#CDD6F4">&gt;(</tspan>
      </text>
      <text x="24" y="280">
        <tspan fill="#CDD6F4">        input, &amp;</tspan><tspan fill="#F38BA8">CONV1_W</tspan><tspan fill="#CDD6F4">, &amp;</tspan><tspan fill="#F38BA8">CONV1_B</tspan><tspan fill="#CDD6F4">, &amp;</tspan><tspan fill="#CBA6F7" font-weight="600">mut</tspan><tspan fill="#CDD6F4"> conv1,</tspan>
      </text>
      <text x="24" y="304">
        <tspan fill="#CDD6F4">    );</tspan>
      </text>
      <text x="24" y="328">
        <tspan fill="#FAB387">    ops</tspan><tspan fill="#CDD6F4">::</tspan><tspan fill="#89B4FA" font-weight="700">relu_inplace</tspan><tspan fill="#CDD6F4">(&amp;</tspan><tspan fill="#CBA6F7" font-weight="600">mut</tspan><tspan fill="#CDD6F4"> conv1);</tspan>
      </text>
      <text x="24" y="364">
        <tspan fill="#CDD6F4">    </tspan><tspan fill="#CBA6F7" font-weight="600">let mut</tspan><tspan fill="#CDD6F4"> pool1 = [[[</tspan><tspan fill="#F38BA8">0.0f32</tspan><tspan fill="#CDD6F4">; </tspan><tspan fill="#F38BA8">14</tspan><tspan fill="#CDD6F4">]; </tspan><tspan fill="#F38BA8">14</tspan><tspan fill="#CDD6F4">]; </tspan><tspan fill="#F38BA8">8</tspan><tspan fill="#CDD6F4">];</tspan>
      </text>
      <text x="24" y="388">
        <tspan fill="#FAB387">    ops</tspan><tspan fill="#CDD6F4">::</tspan><tspan fill="#89B4FA" font-weight="700">max_pool2d</tspan><tspan fill="#CDD6F4">::&lt;</tspan><tspan fill="#F38BA8">8, 28, 28, 14, 14</tspan><tspan fill="#CDD6F4">&gt;(&amp;conv1, &amp;</tspan><tspan fill="#CBA6F7" font-weight="600">mut</tspan><tspan fill="#CDD6F4"> pool1);</tspan>
      </text>
      <text x="24" y="424" fill="#7F849C" font-style="italic">    // …4 more layers, all on the stack</text>
      <text x="24" y="448">
        <tspan fill="#CDD6F4">    fc2_out</tspan>
      </text>
    </g>
  </g>
</svg>
